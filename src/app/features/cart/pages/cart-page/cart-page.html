<div class="cart-page">

  <h1>
    Shopping Cart
  </h1>

  <div
    class="cart-item"
    *ngFor="
      let item of cartService.cartItems()
    "
  >

    <img
      [src]="item.product.thumbnail"
      [alt]="item.product.title"
    />

    <div>

      <h2>
        {{ item.product.title }}
      </h2>

      <p>
        Quantity:
        {{ item.quantity }}
      </p>

      <p>
        ₹{{ item.product.discountPrice }}
      </p>

      <button
        (click)="
          cartService.removeFromCart(
            item.product.id
          )
        "
      >
        Remove
      </button>

    </div>

  </div>

  <h2 class="total">

    Total:
    ₹{{ cartService.totalPrice() }}

  </h2>
  <div class="checkout-section">

  <button
    routerLink="/checkout"
    class="checkout-button"
  >
    Proceed To Checkout
  </button>

</div>
</div>
