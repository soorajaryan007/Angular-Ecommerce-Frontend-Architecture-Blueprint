<div class="login-page">

  <form
    class="login-form"

    [formGroup]="loginForm"

    (ngSubmit)="onSubmit()"
  >

    <h1>
      Login
    </h1>

    <input
      type="email"

      placeholder="Email"

      formControlName="email"
    />

    <input
      type="password"

      placeholder="Password"

      formControlName="password"
    />

    <button type="submit">
      Login Here
    </button>

    @if(errorMessage) {

      <p class="error">
        {{ errorMessage }}
      </p>
    }

  </form>

</div>
