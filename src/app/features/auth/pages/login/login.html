<div class="login-page">

  <form
    [formGroup]="loginForm"
    (ngSubmit)="onSubmit()"
    class="login-form"
  >

    <h1>
      Login
    </h1>

    <input
      type="email"
      placeholder="Email"
      formControlName="email"
    />

    <input
      type="password"
      placeholder="Password"
      formControlName="password"
    />

    <button type="submit">
      Login
    </button>

    <p
      class="error"
      *ngIf="errorMessage"
    >
      {{ errorMessage }}
    </p>

  </form>

</div>
