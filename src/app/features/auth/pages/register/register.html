<div class="register-page">

  <form
    class="register-form"

    [formGroup]="registerForm"

    (ngSubmit)="onSubmit()"
  >

    <h1>
      Create Account
    </h1>

    <input
      type="text"

      placeholder="Full Name"

      formControlName="name"
    />

    <input
      type="email"

      placeholder="Email"

      formControlName="email"
    />

    <input
      type="password"

      placeholder="Password"

      formControlName="password"
    />

    <input
      type="password"

      placeholder="Confirm Password"

      formControlName="confirmPassword"
    />

    <button type="submit">
      Register
    </button>

    @if(errorMessage) {

      <p class="error">
        {{ errorMessage }}
      </p>
    }

  </form>

</div>
