<div
  class="product-detail"
  *ngIf="product as p"
>

  <div class="image-section">

    <img
      [src]="p.thumbnail"
      [alt]="p.title"
    />

  </div>

  <div class="info-section">

    <h1 class="title">
      {{ p.title }}
    </h1>

    <p class="brand">
      {{ p.brand }}
    </p>

    <p class="description">
      {{ p.description }}
    </p>

    <div class="price-section">

      <span class="discount-price">
        ₹{{ p.discountPrice }}
      </span>

      <span class="actual-price">
        ₹{{ p.price }}
      </span>

    </div>

    <p class="rating">
      ⭐ {{ p.rating }}
    </p>

    <p class="stock">
      In Stock:
      {{ p.stock }}
    </p>

    <button class="cart-btn">
      Add To Cart
    </button>

  </div>

</div>
