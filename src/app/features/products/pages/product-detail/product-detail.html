<div
  class="product-detail"
  *ngIf="product"
>

  <div class="image-section">

    <img
      [src]="product.thumbnail"
      [alt]="product.title"
    />

  </div>

  <div class="info-section">

    <h1>
      {{ product.title }}
    </h1>

    <p class="brand">
      {{ product.brand }}
    </p>

    <p class="description">
      {{ product.description }}
    </p>

    <div class="price-section">

      <span class="discount-price">
        ₹{{ product.discountPrice }}
      </span>

      <span class="actual-price">
        ₹{{ product.price }}
      </span>

    </div>

    <p class="rating">
      ⭐ {{ product.rating }}
    </p>

    <p class="stock">
      In Stock:
      {{ product.stock }}
    </p>

    <button>
      Add To Cart
    </button>

  </div>

</div>
